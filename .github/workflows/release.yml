name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tox:
    permissions:
      contents: read
    uses: ./.github/workflows/tox.yml
    secrets: inherit
  publish:
    needs: [tox]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/pypi.yml
    secrets: inherit
  docs:
    needs: [publish]
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    secrets: inherit
